<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Find Trains</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Search Trains</h1>
  </header>

  <section class="form-section">
    <form>
      <label>From:</label>
      <input type="text" placeholder="Enter Source Station" required>
      
      <label>To:</label>
      <input type="text" placeholder="Enter Destination Station" required>
      
      <label>Date of Journey:</label>
      <input type="date" required>
      
      <button type="submit">Search</button>
    </form>
  </section>
</body>
</html>
